services:

  # Backend service - run the FastAPI backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: perishless-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./perishless-3c73c-firebase-adminsdk-fbsvc-17d12425cf.json:/app/firebase.json:ro
    environment:
      FIREBASE_KEY_PATH: /app/firebase.json

  # Frontend service - run the React frontend with nginx serving the built files
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
    container_name: perishless-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"