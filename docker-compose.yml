services:

  # Backend service - run the FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perishless-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./perishless-3c73c-firebase-adminsdk-fbsvc-17d12425cf.json:/app/firebase.json:ro
    environment:
      GOOGLE_CLOUD_CONNECTION_STIRNG: ${GOOGLE_CLOUD_CONNECTION_STIRNG}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GOOGLE_CLOUD_USERNAME: ${GOOGLE_CLOUD_USERNAME}
      GOOGLE_CLOUD_PASSWORD: ${GOOGLE_CLOUD_PASSWORD}
      PEXELS_API_KEY: ${PEXELS_API_KEY}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      ELEVEN_LABS_API_KEY: ${ELEVEN_LABS_API_KEY}
      

  # Frontend service - run the React frontend with nginx serving the built files
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: perishless-frontend
    restart: always
    ports:
      - "3000:80"